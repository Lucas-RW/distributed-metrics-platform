name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
 
jobs:
  build-and-test:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
 
      - name: Set Up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
 
      - name: Verify Dependencies
        run: go mod verify
 
      - name: Run Tests
        run: go test -v -race ./...
 
      - name: Build
        run: go build ./cmd/server/...